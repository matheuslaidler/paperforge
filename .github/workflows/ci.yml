name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + tests (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Linux runners need a few X libs to import PySide6 even for unit tests.
      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff — real bugs only)
        run: ruff check src tests

      - name: Tests (pytest)
        run: pytest -q

# Releases (Windows .exe + Linux binary) are built locally and uploaded to
# the GitHub Release page by hand. The previous "release on tag" workflow
# was removed to avoid maintaining PyInstaller / PySide6 / Qt-on-CI quirks
# for a one-developer project. See dist/RELEASE_NOTES.md for what ships.
