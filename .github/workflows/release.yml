name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # create GitHub Release
  id-token: write       # PyPI trusted publishing

jobs:
  build-binaries:
    name: Build standalone binary
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: paperforge-windows-x64
            ext: .exe
          - os: ubuntu-latest
            artifact: paperforge-linux-x64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 \
            libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libdbus-1-3

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Generate Windows .ico
        if: runner.os == 'Windows'
        run: python scripts/build_icon.py

      - name: Build with PyInstaller (spec file)
        run: pyinstaller paperforge.spec --noconfirm

      - name: Smoke test (CLI mode)
        shell: bash
        run: |
          dist/paperforge${{ matrix.ext }} --cli || true
          # GUI mode is not testable headless on CI; rely on smoke import.

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/paperforge${{ matrix.ext }}

  build-wheel:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  publish:
    name: Publish release
    needs: [build-binaries, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/paperforge-windows-x64/*
            artifacts/paperforge-linux-x64/*
            artifacts/pypi-dist/*
          generate_release_notes: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/pypi-dist/
          skip-existing: true
